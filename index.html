function calcularPontos(nome){

let pontos = 0;

jogos.forEach(jogo => {

    // ignora jogos sem resultado
    if(jogo.golsCasa === null || jogo.golsFora === null){
        return;
    }

    const palpite = palpites[nome]?.[jogo.id];

    // participante não palpitou
    if(!palpite){
        return;
    }

    // placar exato = 5 pontos
    if(
        palpite.casa === jogo.golsCasa &&
        palpite.fora === jogo.golsFora
    ){
        pontos += 5;
        return;
    }

    // vencedor correto = 3 pontos
    const resultadoReal =
        Math.sign(jogo.golsCasa - jogo.golsFora);

    const resultadoPalpite =
        Math.sign(palpite.casa - palpite.fora);

    if(resultadoReal === resultadoPalpite){
        pontos += 3;
    }

});

return pontos;

}

function gerarRanking(){

let ranking = participantes.map(nome => {

    return {
        nome: nome,
        pontos: calcularPontos(nome)
    };

});

ranking.sort((a,b) => b.pontos - a.pontos);

return ranking;

}

function carregarJogos(){

div.innerHTML = "";

jogos.forEach(jogo => {

let resultado = "- x -";

if(jogo.golsCasa !== null){
    resultado =
    `${jogo.golsCasa} x ${jogo.golsFora}`;
}

let htmlPalpites = "";

const lista = participantes.map(nome => ({
    nome,
    pontos: pontosDoJogo(nome,jogo.id),
    palpite: palpites[nome]?.[jogo.id]
}));

lista.sort((a,b)=>b.pontos-a.pontos);

lista.forEach(item => {

    let classe = "pontos0";

    if(item.pontos === 5)
        classe = "pontos5";

    if(item.pontos === 3)
        classe = "pontos3";

    if(item.palpite){

        htmlPalpites += `
        <div class="${classe}">
            ${item.nome}
            →
            ${item.palpite.casa}
            x
            ${item.palpite.fora}
            (${item.pontos} pts)
        </div>
        `;

});

div.innerHTML += `

${jogo.casa}
${resultado}
${jogo.fora}

<br>

${htmlPalpites}

</details>

`;

});

}

function atualizarResultado(id, lado, valor){

const jogo = jogos.find(j => j.id == id);

if(!jogo) return;

jogo[
lado === "casa"
? "golsCasa"
: "golsFora"
] = Number(valor);

}

// ========== SELECT DE JOGOS ==========
function carregarSelect(){
let select = document.getElementById("selectJogo");

jogos.forEach(j => {
select.innerHTML += `<option value="${j.id}">
${j.casa} x ${j.fora}
</option>`;
});
}

// ========== MOSTRAR PALPITES ==========
function mostrarPalpites(){

let id = document.getElementById("selectJogo").value;

let div = document.getElementById("listaPalpites");

div.innerHTML = "";

const lista = participantes.map(nome => ({
    nome: nome,
    pontos: pontosDoJogo(nome,id),
    palpite: palpites[nome]?.[id]
}));

lista.sort((a,b)=>b.pontos-a.pontos);

lista.forEach(item => {

    let classe = "pontos0";

    if(item.pontos === 5){
        classe = "pontos5";
    }
    else if(item.pontos === 3){
        classe = "pontos3";
    }

    if(item.palpite){

        div.innerHTML += `
        <div class="card ${classe}">
            <strong>${item.nome}</strong>
            → ${item.palpite.casa} x ${item.palpite.fora}
            (${item.pontos} pts)
        </div>
        `;

    } else {

        div.innerHTML += `
        <div class="card pontos0">
            <strong>${item.nome}</strong>
            → sem palpite
        </div>
        `;

    }

});

}

// ========== NAVEGAÇÃO ==========
function mostrar(tela){

document.getElementById("jogosView").style.display="none";
document.getElementById("palpitesView").style.display="none";
document.getElementById("rankingView").style.display="none";

if(tela==="jogos"){
document.getElementById("jogosView").style.display="block";
}

if(tela==="palpites"){
document.getElementById("palpitesView").style.display="block";
}

if(tela==="ranking"){
document.getElementById("rankingView").style.display="block";
mostrarRanking();
}

}

function mostrarRanking(){

const tabela =
document.getElementById("tabelaRanking");

tabela.innerHTML = "";

const ranking = gerarRanking();

ranking.forEach((item,index)=>{

tabela.innerHTML += `
<tr>
<td>${index+1}º</td>
<td>${item.nome}</td>
<td>${item.pontos}</td>
</tr>
`;

});

}

function pontosDoJogo(nome, jogoId){

    const jogo = jogos.find(j => j.id == jogoId);

    if(!jogo) return 0;

    if(jogo.golsCasa === null || jogo.golsFora === null){
        return 0;
    }

    const palpite = palpites[nome]?.[jogoId];

    if(!palpite){
        return 0;
    }

    // Placar exato
    if(
        palpite.casa === jogo.golsCasa &&
        palpite.fora === jogo.golsFora
    ){
        return 5;
    }

    // Resultado correto
    const resultadoReal =
        Math.sign(jogo.golsCasa - jogo.golsFora);

    const resultadoPalpite =
        Math.sign(palpite.casa - palpite.fora);

    if(resultadoReal === resultadoPalpite){
        return 3;
    }

    return 0;
}



// inicialização
carregarJogos();
carregarSelect();
mostrar("jogos");

</script>
