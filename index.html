body {

/* Cards ocupam largura total no celular */

padding: 12px;

/* Inputs mais adaptados */
input, select {
padding: 8px;
margin: 4px 0;
font-size: 16px;
}

/* Navegação mais flexível */
nav {
display: flex;
gap: 8px;

width: 100%;
border-collapse: collapse;
background: white;
}

th, td {
padding: 8px;
text-align: center;
border: 1px solid #ddd;
font-size: 14px;
}

/* 📱 AJUSTES PARA CELULAR */
@media (max-width: 600px) {

h1 {
font-size: 18px;
}

h2 {
font-size: 16px;
}

button {
width: 100%;
}

.card {
font-size: 14px;

}

table {

.pontos3{

}

.pontos0{
background:#f8d7da;

border-radius:5px;
}

.alerta-prazo{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;

    background:linear-gradient(135deg,#fff3cd,#ffe69c);
    border:3px solid #ffc107;
    border-radius:12px;

    padding:18px;
    margin:20px auto;

    box-shadow:0 4px 15px rgba(0,0,0,0.15);

    animation:pulsar 2s infinite;
}

.alerta-icone{
    font-size:40px;
}

.alerta-texto{
    flex:1;
}

.alerta-texto strong{
    display:block;
    font-size:20px;
    color:#856404;
    margin-bottom:5px;
}

.alerta-texto span{
    font-size:16px;
    color:#5f4b00;
}

.btn-palpite{
    background:#198754;
    color:white;
    text-decoration:none;

    padding:12px 22px;
    border-radius:8px;

    font-weight:bold;
    white-space:nowrap;

    transition:0.3s;
}

.btn-palpite:hover{
    transform:scale(1.05);
}

@keyframes pulsar{
    0%{
        box-shadow:0 0 0 rgba(255,193,7,0.5);
    }

    50%{
        box-shadow:0 0 20px rgba(255,193,7,0.8);
    }

    100%{
        box-shadow:0 0 0 rgba(255,193,7,0.5);
    }
}

/* Responsivo para celular */
@media (max-width: 768px){

    .alerta-prazo{
        flex-direction:column;
        text-align:center;
    }

    .btn-palpite{
        width:100%;
    }
}

.status-palpites{
    max-width:900px;
    margin:20px auto;
    padding:20px;

    background:#e8f5e9;

    border-left:6px solid #28a745;
    border-radius:10px;
}

.status-palpites h3{
    margin-top:0;
    color:#155724;
}

.lista-enviados{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.participante{
    background:#28a745;
    color:white;

    padding:8px 12px;
    border-radius:20px;

    font-size:14px;
    font-weight:bold;
}

function calcularPontos(nome){

let pontos = 0;

jogos.forEach(jogo => {

    // ignora jogos sem resultado
    if(jogo.golsCasa === null || jogo.golsFora === null){
        return;
    }

    const palpite = palpites[nome]?.[jogo.id];

    // participante não palpitou
    if(!palpite){
        return;
    }

    // placar exato = 5 pontos
    if(
        palpite.casa === jogo.golsCasa &&
        palpite.fora === jogo.golsFora
    ){
        pontos += 5;
        return;
    }

    // vencedor correto = 3 pontos
    const resultadoReal =
        Math.sign(jogo.golsCasa - jogo.golsFora);

    const resultadoPalpite =
        Math.sign(palpite.casa - palpite.fora);

    if(resultadoReal === resultadoPalpite){
        pontos += 3;
    }

});

return pontos;

}

function gerarRanking(){

let ranking = participantes.map(nome => {

    return {
        nome: nome,
        pontos: calcularPontos(nome)
    };

});

ranking.sort((a,b) => b.pontos - a.pontos);

return ranking;

}

// ========== JOGOS ==========
function carregarJogos(){

let div = document.getElementById("jogosView");

div.innerHTML = "";

jogos.forEach(jogo => {

let resultado = "- x -";

if(jogo.golsCasa !== null){
    resultado =
    `${jogo.golsCasa} x ${jogo.golsFora}`;
}

let htmlPalpites = "";

const lista = participantes.map(nome => ({
    nome,
    pontos: pontosDoJogo(nome,jogo.id),
    palpite: palpites[nome]?.[jogo.id]
}));

lista.sort((a,b)=>b.pontos-a.pontos);

lista.forEach(item => {

    let classe = "pontos0";

    if(item.pontos === 5)
        classe = "pontos5";

    if(item.pontos === 3)
        classe = "pontos3";

    if(item.palpite){

        htmlPalpites += `
        <div class="${classe}">
            ${item.nome}
            →
            ${item.palpite.casa}
            x
            ${item.palpite.fora}
            (${item.pontos} pts)
        </div>
        `;
    }

});

div.innerHTML += `

<details class="card">

<summary>

<strong>
${jogo.casa}
${resultado}
${jogo.fora}
</strong>

</summary>

<br>

${htmlPalpites}

</details>

`;

});

}

function mostrarPalpites(){

div.innerHTML = "";

const lista = participantes.map(nome => ({
    nome: nome,
    pontos: pontosDoJogo(nome,id),
    palpite: palpites[nome]?.[id]
}));

lista.sort((a,b)=>b.pontos-a.pontos);

lista.forEach(item => {

    let classe = "pontos0";

    }

    if(item.palpite){

        div.innerHTML += `

        div.innerHTML += `

            <strong>${item.nome}</strong>
            → sem palpite
        </div>
        `;

    }

});

}

// ========== NAVEGAÇÃO ==========
function mostrar(tela){

document.getElementById("jogosView").style.display="none";
document.getElementById("palpitesView").style.display="none";
document.getElementById("rankingView").style.display="none";

if(tela==="jogos"){
document.getElementById("jogosView").style.display="block";
}

if(tela==="palpites"){
document.getElementById("palpitesView").style.display="block";
}

if(tela==="ranking"){
document.getElementById("rankingView").style.display="block";
mostrarRanking();
}

}

function mostrarRanking(){

const tabela =
document.getElementById("tabelaRanking");

tabela.innerHTML = "";

const ranking = gerarRanking();

ranking.forEach((item,index)=>{

tabela.innerHTML += `
<tr>
<td>${index+1}º</td>
<td>${item.nome}</td>
<td>${item.pontos}</td>
</tr>
`;

});

}

function pontosDoJogo(nome, jogoId){

    const jogo = jogos.find(j => j.id == jogoId);

    if(!jogo) return 0;

    if(jogo.golsCasa === null || jogo.golsFora === null){
        return 0;
    }

    const palpite = palpites[nome]?.[jogoId];

    if(!palpite){
        return 0;
    }

    // Placar exato
    if(
        palpite.casa === jogo.golsCasa &&
        palpite.fora === jogo.golsFora
    ){
        return 5;
    }

    // Resultado correto
    const resultadoReal =
        Math.sign(jogo.golsCasa - jogo.golsFora);

    const resultadoPalpite =
        Math.sign(palpite.casa - palpite.fora);

    if(resultadoReal === resultadoPalpite){
        return 3;
    }

    return 0;
}
